name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Code Marketplace and Open VSX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        working-directory: vscode
        run: npm ci

      - name: Compile
        working-directory: vscode
        run: npm run compile

      # Derive the semver from the git tag (strip leading "v").
      - name: Extract version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"            # e.g. v0.2.0
          VER="${TAG#v}"                       # e.g. 0.2.0
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"

      # Bump the version in package.json to match the release tag so the
      # published extension version is always in sync with the Go binary.
      - name: Bump package.json version
        working-directory: vscode
        run: |
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package extension
        working-directory: vscode
        run: npx --yes @vscode/vsce package --no-dependencies -o "goroscope-${{ steps.ver.outputs.version }}.vsix"

      # Publish to Visual Studio Marketplace.
      # Requires the VSCE_PAT secret: an Azure DevOps Personal Access Token
      # with Marketplace > Publish scope for the "goroscope" publisher.
      # See docs/distribution.md for step-by-step setup.
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "goroscope-${{ steps.ver.outputs.version }}.vsix" --pat "$VSCE_PAT"

      # Publish to Open VSX Registry (JetBrains Marketplace, VSCodium, etc.).
      # Requires the OVSX_PAT secret: a token from https://open-vsx.org.
      # See docs/distribution.md for step-by-step setup.
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish "goroscope-${{ steps.ver.outputs.version }}.vsix" --pat "$OVSX_PAT"

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: goroscope-vscode-${{ steps.ver.outputs.version }}
          path: vscode/goroscope-${{ steps.ver.outputs.version }}.vsix
          retention-days: 90
