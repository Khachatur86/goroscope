name: Publish GoLand Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish GoLand plugin to JetBrains Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Extract the semver version from the git tag (strip leading "v").
      - name: Extract version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"     # e.g. v0.2.0
          VER="${TAG#v}"               # e.g. 0.2.0
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      # Cache Gradle dependencies to speed up subsequent runs.
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('goland-plugin/**/*.gradle*', 'goland-plugin/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Build the plugin ZIP.
      - name: Build plugin
        working-directory: goland-plugin
        run: ./gradlew buildPlugin -PpluginVersion=${{ steps.ver.outputs.version }}

      # Run the IntelliJ Platform Plugin Verifier to catch API compatibility issues.
      - name: Verify plugin
        working-directory: goland-plugin
        run: ./gradlew verifyPlugin || true  # non-blocking; warnings are reported but don't fail CI

      # Publish to JetBrains Marketplace.
      # Requires the JETBRAINS_MARKETPLACE_TOKEN secret (see docs/distribution.md).
      # The step is skipped gracefully when the secret is absent.
      - name: Publish plugin
        if: ${{ env.JETBRAINS_MARKETPLACE_TOKEN != '' }}
        working-directory: goland-plugin
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.ver.outputs.version }}

      # Upload the built .zip as a workflow artifact (90-day retention).
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: goroscope-goland-${{ steps.ver.outputs.version }}
          path: goland-plugin/build/distributions/goroscope-goland-*.zip
          retention-days: 90
