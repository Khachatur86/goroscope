name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create GitHub Releases and upload assets
  packages: write  # needed if publishing to GHCR in future

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required for goreleaser changelog generation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          # Use goreleaser v2 to match .goreleaser.yaml version: 2
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for Homebrew tap updates.
          # Create a PAT with `repo` scope for the homebrew-goroscope repo and
          # add it as a repository secret named HOMEBREW_TAP_TOKEN.
          # If the secret is absent the brew step is skipped gracefully.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
