# GoReleaser v2 configuration for goroscope.
# Docs: https://goreleaser.com/customization/
version: 2

# ── Pre-release hooks ──────────────────────────────────────────────────────────
before:
  hooks:
    # Build the React UI and embed it into internal/api/reactui/ so that
    # the compiled binary is fully self-contained (no web/dist alongside it).
    - make embed-web

# ── Builds ────────────────────────────────────────────────────────────────────
builds:
  - id: goroscope
    main: ./cmd/goroscope
    binary: goroscope
    # Embed version string from the git tag.
    ldflags:
      - -s -w -X github.com/Khachatur86/goroscope/internal/version.Version={{.Version}}
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No Windows ARM64 target — too niche for a dev-tool.
      - goos: windows
        goarch: arm64

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - id: goroscope
    name_template: "goroscope_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    # The React UI is embedded in the binary via embed.FS (make embed-web).
    # Archives only need the README and LICENSE — no separate web/dist dir.
    files:
      - README.md
      - LICENSE

# ── Checksums ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "goroscope_{{ .Version }}_checksums.txt"
  algorithm: sha256

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

# ── GitHub Release ────────────────────────────────────────────────────────────
release:
  github:
    owner: Khachatur86
    name: goroscope
  draft: false
  prerelease: auto
  name_template: "goroscope {{.Tag}}"
  footer: |
    ## Installation

    **Homebrew (macOS/Linux):**
    ```sh
    brew install Khachatur86/goroscope/goroscope
    ```

    **go install** (React UI baked in — fully self-contained):
    ```sh
    go install github.com/Khachatur86/goroscope/cmd/goroscope@{{.Tag}}
    ```

    **Manual download:** pick the archive for your OS/arch above.

# ── Homebrew tap ──────────────────────────────────────────────────────────────
# Requires a separate repo: github.com/Khachatur86/homebrew-goroscope
# Create it once, then every tagged release auto-updates the formula.
brews:
  - name: goroscope
    homepage: "https://github.com/Khachatur86/goroscope"
    description: "Local Go concurrency debugger — goroutine lifecycle, blocking, channels, and mutex interactions on an interactive timeline."
    license: "MIT"
    repository:
      owner: Khachatur86
      name: homebrew-goroscope
      branch: main
      # Set HOMEBREW_TAP_TOKEN in repo secrets (a PAT with repo write access
      # to homebrew-goroscope). See docs/distribution.md for setup instructions.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "goroscope"
    test: |
      system "#{bin}/goroscope", "version"

# ── Docker images (I-2) ───────────────────────────────────────────────────────
# Published to GHCR on every tagged release.
# The Dockerfile is a multi-stage build: Node (React) → Go → scratch.
dockers:
  - id: goroscope-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/khachatur86/goroscope:{{ .Tag }}-amd64"
      - "ghcr.io/khachatur86/goroscope:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.title=goroscope"
      - "--label=org.opencontainers.image.description=Local Go concurrency debugger"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/Khachatur86/goroscope"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

  - id: goroscope-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/khachatur86/goroscope:{{ .Tag }}-arm64"
      - "ghcr.io/khachatur86/goroscope:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.title=goroscope"
      - "--label=org.opencontainers.image.description=Local Go concurrency debugger"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/Khachatur86/goroscope"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

# Multi-arch manifest combining amd64 + arm64 images.
docker_manifests:
  - name_template: "ghcr.io/khachatur86/goroscope:{{ .Tag }}"
    image_templates:
      - "ghcr.io/khachatur86/goroscope:{{ .Tag }}-amd64"
      - "ghcr.io/khachatur86/goroscope:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/khachatur86/goroscope:latest"
    image_templates:
      - "ghcr.io/khachatur86/goroscope:latest-amd64"
      - "ghcr.io/khachatur86/goroscope:latest-arm64"

# ── Announce ──────────────────────────────────────────────────────────────────
# (Slack/Discord announce can be added here when ready)
